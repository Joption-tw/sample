    <script>
        const SHEET_ID = '1AsY4_MJipaMp_cNLpyeXTpFGnG0FD4vWJu-SDRdvtME';
        const GID = '1823639969';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        
        let myChart = null;
        let globalData = null;
        let currentSessionIdx = -1;
        let axisState = { lIdx: false, lTot: true, rPrf: true, rTmv: true };

        const rowRanges = [
            { label: '周三晚', start: 2, end: 419, type: 'night' }, 
            { label: '週四早', start: 420, end: 569, type: 'day' },   
            { label: '週四晚', start: 570, end: 989, type: 'night' }, 
            { label: '週五早', start: 990, end: 1139, type: 'day' },  
            { label: '週五晚', start: 1140, end: 1559, type: 'night' },
            { label: '周一早', start: 1560, end: 1709, type: 'day' },  
            { label: '周一晚', start: 1710, end: 2129, type: 'night' },
            { label: '週二早', start: 2130, end: 2279, type: 'day' },  
            { label: '周二晚', start: 2280, end: 2699, type: 'night' },
            { label: '週三早', start: 2700, end: 2849, type: 'day' }   
        ];

        // --- 百點震幅計算演算法 (導入自 index.html) ---
        function calculateSwing100(prices, threshold = 100) {
            const valid = prices.filter(p => p !== null);
            if (valid.length < 2) return 0;
            
            let totalSwing = 0;
            let lastPivot = valid[0];
            let currentHigh = valid[0];
            let currentLow = valid[0];
            let trend = 0; // 0: 無趨勢, 1: 漲, -1: 跌

            for (let i = 1; i < valid.length; i++) {
                let p = valid[i];
                if (trend === 0) {
                    if (p >= lastPivot + threshold) { trend = 1; currentHigh = p; }
                    else if (p <= lastPivot - threshold) { trend = -1; currentLow = p; }
                } else if (trend === 1) {
                    if (p > currentHigh) { currentHigh = p; }
                    else if (p <= currentHigh - threshold) {
                        totalSwing += (currentHigh - lastPivot);
                        trend = -1; lastPivot = currentHigh; currentLow = p;
                    }
                } else if (trend === -1) {
                    if (p < currentLow) { currentLow = p; }
                    else if (p >= currentLow + threshold) {
                        totalSwing += (lastPivot - currentLow);
                        trend = 1; lastPivot = currentLow; currentHigh = p;
                    }
                }
            }
            // 處理最後一個未完成波段
            if (trend === 1 && currentHigh > lastPivot + threshold) totalSwing += (currentHigh - lastPivot);
            else if (trend === -1 && currentLow < lastPivot - threshold) totalSwing += (lastPivot - currentLow);
            
            return totalSwing;
        }

        // ── 時間字串解析為當日分鐘數（支援跨午夜） ────────────────────────
        function parseMinutes(label, prevMin) {
            const parts = (label || '').trim().split(/\s+/);
            const timePart = parts.length >= 2 ? parts[parts.length - 1] : parts[0];
            const m = timePart.match(/(\d{1,2}):(\d{2})/);
            if (!m) return null;
            let mins = parseInt(m[1]) * 60 + parseInt(m[2]);
            // 跨午夜：若比前一筆小超過 120 分鐘，代表過了 00:00
            if (prevMin !== null && prevMin !== undefined && mins + 1440 - prevMin < 360 && mins < prevMin) {
                mins += 1440;
            }
            return mins;
        }

        // 線性內插：在 x=t 點對陣列 vals（對應 mins 陣列）取值
        function lerp(mins, vals, t) {
            for (let i = 0; i < mins.length - 1; i++) {
                if (mins[i] <= t && t <= mins[i + 1]) {
                    const ratio = (t - mins[i]) / (mins[i + 1] - mins[i]);
                    const a = vals[i], b = vals[i + 1];
                    if (a === null || b === null) return null;
                    return a + (b - a) * ratio;
                }
            }
            return null;
        }

        function fmtMin(totalMins) {
            const m = ((totalMins % 1440) + 1440) % 1440;
            return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
        }

        async function exportExcel() {
            if (!globalData || currentSessionIdx === -1) return;
            const r = rowRanges[currentSessionIdx];
            const si = r.start - 2;
            const ei = Math.min(r.end - 2, globalData.x.length - 1);
            if (si >= globalData.x.length) return;

            const labels   = globalData.x.slice(si, ei + 1);
            const price    = globalData.yPrice.slice(si, ei + 1);
            const priceRaw = globalData.yPriceRaw.slice(si, ei + 1);
            const profit   = globalData.yProfit.slice(si, ei + 1);
            const wed      = globalData.yTimeWed.slice(si, ei + 1);
            const fri      = globalData.yTimeFri.slice(si, ei + 1);
            const total    = globalData.yTotal.slice(si, ei + 1);
            const totalRaw = globalData.yTotalRaw.slice(si, ei + 1);

            const now = new Date(); const pad = n => n.toString().padStart(2, '0');
            const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}`;
            const sessionLabel = rowRanges[currentSessionIdx].label;

            const wb = new ExcelJS.Workbook();
            wb.creator = 'Joption';
            wb.created = now;

            // ── 共用：欄標題樣式 ───────────────────────────────────────────
            const hdrStyle = { font: { bold: true, color: { argb: 'FFFFFFFF' } }, fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E3A5F' } }, alignment: { horizontal: 'center' } };
            function applyHeader(ws, cols) {
                const row = ws.addRow(cols);
                row.eachCell(c => { c.font = hdrStyle.font; c.fill = hdrStyle.fill; c.alignment = hdrStyle.alignment; });
                row.height = 18;
            }
            function setColWidths(ws, widths) {
                widths.forEach((w, i) => { ws.getColumn(i + 1).width = w; });
            }

            // ── Sheet 1：原始資料 ──────────────────────────────────────────
            const ws1 = wb.addWorksheet('原始資料');
            applyHeader(ws1, ['時間', '期指(原始)', '期指(平滑)', '獲利率%', '週三時價', '週五時價', '總點數(原始)', '總點數(平滑)']);
            setColWidths(ws1, [12, 12, 12, 10, 10, 10, 14, 14]);
            for (let i = 0; i < labels.length; i++) {
                ws1.addRow([labels[i], priceRaw[i] ?? null, price[i] ?? null, profit[i] ?? null, wed[i] ?? null, fri[i] ?? null, totalRaw[i] ?? null, total[i] ?? null]);
            }

            // ── Sheet 2：每分鐘內插 ────────────────────────────────────────
            const mins = [];
            let prevMin = null;
            for (let i = 0; i < labels.length; i++) {
                const m = parseMinutes(labels[i], prevMin);
                mins.push(m);
                if (m !== null) prevMin = m;
            }
            const validMins = mins.filter(v => v !== null);
            if (validMins.length >= 2) {
                const ws2 = wb.addWorksheet('每分鐘內插');
                applyHeader(ws2, ['時間', '期指(原始)', '期指(平滑)', '獲利率%', '週三時價', '週五時價', '總點數']);
                setColWidths(ws2, [10, 12, 12, 10, 10, 10, 12]);
                const minT = validMins[0], maxT = validMins[validMins.length - 1];
                for (let t = minT; t <= maxT; t++) {
                    const v = (arr, dp) => { const r = lerp(mins, arr, t); return r !== null ? +r.toFixed(dp) : null; };
                    ws2.addRow([fmtMin(t), v(priceRaw,1), v(price,1), v(profit,4), v(wed,0), v(fri,0), v(total,1)]);
                }
            }

            // ── Sheet 3：績效圖（ECharts 截圖嵌入） ────────────────────────
            if (myChart) {
                try {
                    const dataUrl = myChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#f8fafc' });
                    const base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
                    const ws3 = wb.addWorksheet('績效圖');
                    ws3.getCell('A1').value = `${sessionLabel} 績效圖表`;
                    ws3.getCell('A1').font = { bold: true, size: 14, color: { argb: 'FF1E3A5F' } };
                    const imgId = wb.addImage({ base64, extension: 'png' });
                    ws3.addImage(imgId, { tl: { col: 0, row: 1 }, ext: { width: 1100, height: 550 } });
                    ws3.getColumn(1).width = 15;
                } catch (e) { console.warn('圖表嵌入失敗', e); }
            }

            // ── 下載 ──────────────────────────────────────────────────────
            const buf = await wb.xlsx.writeBuffer();
            const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `雙賣平衡_${sessionLabel}_${ts}.xlsx`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function takeScreenshot() {
            const root = document.getElementById('capture-root');
            const loading = document.getElementById('loading-overlay');
            const msgEl = document.getElementById('loading-msg');
            const isMobile = window.innerWidth < 768;
            loading.classList.remove('hidden'); loading.style.opacity = '1';
            msgEl.innerText = "正在生成高品質報表...";
            try {
                await new Promise(r => setTimeout(r, 500));
                const canvas = await html2canvas(root, {
                    useCORS: true, backgroundColor: '#f8fafc', scale: isMobile ? 3 : 4, logging: false,
                    onclone: (clonedDoc) => {
                        const clonedRoot = clonedDoc.getElementById('capture-root');
                        clonedRoot.style.width = isMobile ? "1200px" : "1600px";
                        clonedRoot.style.margin = "0 auto";
                        clonedDoc.getElementById('loading-overlay').style.display = 'none';
                    }
                });
                const now = new Date(); const pad = (n) => n.toString().padStart(2, '0');
                const timeStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
                const link = document.createElement('a');
                link.download = `雙賣平衡績效_${timeStr}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
                // 同步匯出 Excel
                try { await exportExcel(); } catch(exErr) { console.warn("Excel 匯出失敗", exErr); }
            } catch (e) { console.error("截圖失敗", e); }
            finally { loading.style.opacity = '0'; setTimeout(() => { loading.classList.add('hidden'); msgEl.innerText = "數據同步處理中"; }, 300); }
        }

        function getAutoSessionIndex() {
            const now = new Date(); const day = now.getDay(); const hour = now.getHours();
            if (day === 1) { if (hour < 6) return 4; if (hour < 14) return 5; return 6; }
            if (day === 2) { if (hour < 6) return 6; if (hour < 14) return 7; return 8; }
            if (day === 3) { if (hour < 6) return 8; if (hour < 14) return 9; return 0; }
            if (day === 4) { if (hour < 6) return 0; if (hour < 14) return 1; return 2; }
            if (day === 5) { if (hour < 6) return 2; if (hour < 14) return 3; return 4; }
            return 4; 
        }

        function parseCSVLine(text) {
            const res = []; let cur = ""; let inQ = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
                else if (char === ',' && !inQ) { res.push(cur.trim()); cur = ""; }
                else cur += char;
            }
            res.push(cur.trim()); return res;
        }

        function rawNumeric(v) {
            if (v === undefined || v === null || v.toString().trim() === "") return null;
            let num = parseFloat(v.toString().replace(/,/g, '').replace(/[^0-9.-]/g, ''));
            return isNaN(num) ? null : num;
        }

        function applySmoothing(arr) {
            if (arr.length < 3) return arr;
            let smoothed = [];
            for (let i = 0; i < arr.length; i++) {
                let sum = 0, count = 0;
                for (let j = i - 1; j <= i + 1; j++) {
                    if (j >= 0 && j < arr.length && arr[j] !== null) { sum += arr[j]; count++; }
                }
                smoothed.push(count > 0 ? parseFloat((sum / count).toFixed(4)) : null);
            }
            return smoothed;
        }

        async function fetchData() {
            const loading = document.getElementById('loading-overlay');
            loading.classList.remove('hidden'); loading.style.opacity = '1';
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const text = await response.text();
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                const raw = { x: [], yPrice: [], yProfit: [], yTimeWed: [], yTimeFri: [], yTotal: [], yTotalRaw: [], yPriceRaw: [] };
                for (let i = 1; i < lines.length; i++) {
                    const cols = parseCSVLine(lines[i]);
                    if (cols.length >= 54) {
                        raw.x.push(cols[0]);
                        const p = rawNumeric(cols[22]);
                        raw.yPriceRaw.push(p); 
                        raw.yPrice.push(p); 
                        raw.yProfit.push(rawNumeric(cols[26])); 
                        raw.yTimeWed.push(rawNumeric(cols[52])); 
                        raw.yTimeFri.push(rawNumeric(cols[53])); 
                        const totalPoint = rawNumeric(cols[12]);
                        raw.yTotal.push(totalPoint); 
                        raw.yTotalRaw.push(totalPoint);
                    }
                }
                ['yPrice', 'yProfit', 'yTimeWed', 'yTimeFri', 'yTotal'].forEach(key => {
                    let cleaned = [...raw[key]];
                    for (let i = 1; i < cleaned.length - 1; i++) {
                        if (cleaned[i] === null || cleaned[i-1] === null || cleaned[i+1] === null) continue;
                        let avg = (cleaned[i-1] + cleaned[i+1]) / 2;
                        let threshold = (Math.abs(avg) < 50) ? 0.3 : avg * 0.005;
                        if (Math.abs(cleaned[i] - avg) > threshold) cleaned[i] = avg;
                    }
                    raw[key] = applySmoothing(cleaned);
                });
                globalData = raw;
                const checkAndInit = () => {
                    if (typeof echarts !== 'undefined') {
                        initChart(globalData);
                        const switcher = document.getElementById('session-switcher');
                        switcher.innerHTML = '';
                        rowRanges.forEach((range, i) => {
                            const btn = document.createElement('button');
                            btn.className = `session-btn ${range.type === 'night' ? 'night' : ''}`;
                            btn.innerText = range.label;
                            btn.onclick = () => selectSession(i);
                            switcher.appendChild(btn);
                        });
                        let autoIdx = getAutoSessionIndex();
                        if ((rowRanges[autoIdx].start - 2) >= globalData.x.length) {
                            let lv = rowRanges.length - 1; 
                            while(lv >= 0 && (rowRanges[lv].start - 2) >= globalData.x.length) lv--;
                            autoIdx = lv;
                        }
                        selectSession(autoIdx >= 0 ? autoIdx : 0);
                        const updateStr = new Date().toLocaleString([], {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                        document.getElementById('update-time').innerText = new Date().toLocaleString();
                        document.getElementById('update-time-mobile').innerText = updateStr;
                    } else { setTimeout(checkAndInit, 100); }
                };
                checkAndInit();
            } catch (e) { console.error(e); }
            finally { setTimeout(() => { loading.style.opacity = '0'; setTimeout(() => loading.classList.add('hidden'), 300); }, 500); }
        }

        function toggleAxis(key) {
            axisState[key] = !axisState[key];
            updateChartUI();
        }

        function updateChartUI() {
            if (!myChart || !globalData) return;
            document.getElementById('btn-l-idx').className = `mode-btn l-idx ${axisState.lIdx ? 'active' : ''}`;
            document.getElementById('btn-l-tot').className = `mode-btn l-tot ${axisState.lTot ? 'active' : ''}`;
            document.getElementById('btn-r-prf').className = `mode-btn r-prf ${axisState.rPrf ? 'active' : ''}`;
            document.getElementById('btn-r-tmv').className = `mode-btn r-tmv ${axisState.rTmv ? 'active' : ''}`;
            const container = document.getElementById('dynamic-legend');
            let legendHtml = '';
            if (axisState.lIdx) legendHtml += `<div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-blue-600"></span><span class="text-[10px] font-black text-slate-700">期指</span></div>`;
            if (axisState.lTot) legendHtml += `<div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-slate-700"></span><span class="text-[10px] font-black text-slate-700">總點數</span></div>`;
            if (axisState.rPrf) legendHtml += `<div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-rose-500"></span><span class="text-[10px] font-black text-slate-700">獲利率</span></div>`;
            if (axisState.rTmv) legendHtml += `<div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-red-500"></span><span class="text-[10px] font-black text-slate-700 text-xs">週三</span></div><div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span><span class="text-[10px] font-black text-slate-700 text-xs">週五</span></div>`;
            if (legendHtml === '') legendHtml = '<span class="text-[11px] text-slate-400">請選取顯示數據項目</span>';
            container.innerHTML = legendHtml;
            const leftAxesCount = (axisState.lIdx ? 1 : 0) + (axisState.lTot ? 1 : 0);
            const rightAxesCount = (axisState.rPrf ? 1 : 0) + (axisState.rTmv ? 1 : 0);
            const getMarkPoint = (name, type) => {
                if (type === 'profit') return { symbol: 'circle', symbolSize: 0, label: { show: true, fontSize: 10, fontWeight: 'bold' }, data: [{ type: 'max', label: { color: '#22d3ee', position: 'top', formatter: '{c}%', offset: [0, -5] } }, { type: 'min', label: { color: '#ec4899', position: 'bottom', formatter: '{c}%', offset: [0, 5] } }] };
                if (name === '期指') return { symbol: 'circle', symbolSize: 0, label: { show: true, fontSize: 10, fontWeight: 'bold' }, data: [{ type: 'max', label: { color: '#ef4444', position: 'top', formatter: (p) => Math.round(p.value).toLocaleString() } }, { type: 'min', label: { color: '#10b981', position: 'bottom', formatter: (p) => Math.round(p.value).toLocaleString() } }] };
                return { symbol: 'circle', symbolSize: 0, label: { show: true, fontSize: 10 }, data: [{ type: 'max', label: { color: name.includes('週三') ? '#ef4444' : (name.includes('週五') ? '#10b981' : '#64748b'), position: 'top', formatter: (p) => Math.round(p.value).toLocaleString() } }] };
            };
            const seriesConfig = [
                { name: '獲利率', data: axisState.rPrf ? globalData.yProfit : [], markPoint: axisState.rPrf ? getMarkPoint('獲利率', 'profit') : { data: [] } },
                { name: '週三時價', data: axisState.rTmv ? globalData.yTimeWed : [], markPoint: axisState.rTmv ? getMarkPoint('週三時價', 'val') : { data: [] } },
                { name: '週五時價', data: axisState.rTmv ? globalData.yTimeFri : [], markPoint: axisState.rTmv ? getMarkPoint('週五時價', 'val') : { data: [] } },
                { name: '期指', data: axisState.lIdx ? globalData.yPrice : [], markPoint: axisState.lIdx ? getMarkPoint('期指', 'idx') : { data: [] } },
                { name: '總點數', data: axisState.lTot ? globalData.yTotal : [], markPoint: axisState.lTot ? getMarkPoint('總點數', 'val') : { data: [] } }
            ];
            const yAxes = [
                { type: 'value', name: '期指', position: 'left', offset: 0, show: axisState.lIdx, axisLabel: { color: '#2563eb', fontWeight: 'bold', fontSize: 10, fontFamily: 'Arial' }, splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } }, min: 'dataMin', max: 'dataMax', scale: true },
                { type: 'value', name: '總點', position: 'left', offset: axisState.lIdx ? 50 : 0, show: axisState.lTot, axisLabel: { color: '#475569', fontWeight: 'bold', fontSize: 10, fontFamily: 'Arial' }, splitLine: { show: false }, min: 0, max: 5000 },
                { type: 'value', name: '獲利%', position: 'right', offset: 0, show: axisState.rPrf, axisLabel: { color: '#e11d48', fontWeight: 'bold', fontSize: 10, fontFamily: 'Arial' }, splitLine: { show: false }, min: -1, max: 5 },
                { type: 'value', name: '時價', position: 'right', offset: axisState.rPrf ? 50 : 0, show: axisState.rTmv, axisLabel: { color: '#9333ea', fontWeight: 'bold', fontSize: 10, fontFamily: 'Arial' }, splitLine: { show: false } }
            ];
            const isMobile = window.innerWidth < 768;
            const dZoom = [ { type: 'slider', xAxisIndex: 0, bottom: 0, height: 20 }, { type: 'slider', yAxisIndex: 0, left: 0, width: 18, show: axisState.lIdx }, { type: 'slider', yAxisIndex: 1, left: axisState.lIdx ? 40 : 0, width: 18, show: axisState.lTot }, { type: 'slider', yAxisIndex: 2, right: 0, width: 18, show: axisState.rPrf }, { type: 'slider', yAxisIndex: 3, right: axisState.rPrf ? 40 : 0, width: 18, show: axisState.rTmv }, { type: 'inside', xAxisIndex: 0, moveOnMouseMove: !isMobile, zoomOnMouseWheel: !isMobile } ];
            myChart.setOption({ textStyle: { fontFamily: 'Arial' }, grid: { left: (leftAxesCount * 55) + 15, right: (rightAxesCount * 55) + 15, top: '8%', bottom: '15%' }, yAxis: yAxes, dataZoom: dZoom, series: seriesConfig.map(s => ({ name: s.name, data: s.data, markPoint: s.markPoint })) });
            if (currentSessionIdx !== -1) selectSession(currentSessionIdx);
        }

        function selectSession(idx) {
            if (!globalData || idx === -1 || !myChart) return;
            currentSessionIdx = idx;
            document.querySelectorAll('.session-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
            const r = rowRanges[idx]; const si = r.start - 2; const ei = Math.min(r.end - 2, globalData.x.length - 1);
            if (si >= globalData.x.length) return;

            const sx = globalData.x.slice(si, ei + 1);
            const spRaw = globalData.yPriceRaw.slice(si, ei + 1); 
            const spr = globalData.yProfit.slice(si, ei + 1).filter(v => v !== null);
            const sw = globalData.yTimeWed.slice(si, ei + 1).filter(v => v !== null);
            const sf = globalData.yTimeFri.slice(si, ei + 1).filter(v => v !== null);
            const stRaw = globalData.yTotalRaw.slice(si, ei + 1);

            // --- 修改：計算並顯示百點震幅 ---
            const swingVal = calculateSwing100(spRaw, 100);
            document.getElementById('stat-swing').innerText = Math.round(swingVal).toLocaleString();

            document.getElementById('stat-profit').innerText = spr.length > 0 ? `${spr[spr.length - 1].toFixed(2)}%` : "--%";
            const sessionPerf = spr.length > 0 ? (spr[spr.length - 1] - spr[0]) : 0;
            const perfEl = document.getElementById('stat-max');
            perfEl.innerText = `${sessionPerf.toFixed(2)}%`;
            perfEl.className = `text-base sm:text-lg font-black stat-value ${sessionPerf >= 0 ? 'text-rose-600' : 'text-emerald-600'}`;
            document.getElementById('stat-time-wed').innerText = sw.length > 0 ? Math.round(sw[sw.length - 1]).toLocaleString() : "--";
            document.getElementById('stat-time-fri').innerText = sf.length > 0 ? Math.round(sf[sf.length - 1]).toLocaleString() : "--";

            // 計算當盤漲跌 & 漲跌幅
            function calcChg(arr) {
                const vals = arr.filter(v => v !== null && v !== 0);
                if (vals.length < 2) return null;
                const first = vals[0], last = vals[vals.length - 1];
                const chg = last - first;
                const pct = first !== 0 ? (chg / first * 100) : 0;
                return { chg, pct };
            }
            function renderChg(elId, result) {
                const el = document.getElementById(elId);
                if (!result) { el.innerText = ''; return; }
                const sign = result.chg >= 0 ? '+' : '';
                el.innerText = `${sign}${Math.round(result.chg).toLocaleString()}（${sign}${result.pct.toFixed(2)}%）`;
                el.className = `text-[9px] sm:text-[10px] font-bold leading-none mt-0.5 ${result.chg >= 0 ? 'text-rose-500' : 'text-emerald-500'}`;
            }
            renderChg('stat-wed-chg', calcChg(globalData.yTimeWed.slice(si, ei + 1)));
            renderChg('stat-fri-chg', calcChg(globalData.yTimeFri.slice(si, ei + 1)));
            
            let entry = "--", exit = "--";
            for(let i=0; i<stRaw.length; i++) { if(stRaw[i] !== 0 && stRaw[i] !== null) { entry = sx[i].split(' ')[1] || sx[i]; break; } }
            if(entry !== "--") {
                let hasEntry = false;
                for(let i=0; i<stRaw.length; i++) { if(!hasEntry && stRaw[i] !== 0 && stRaw[i] !== null) { hasEntry = true; continue; } if(hasEntry && stRaw[i] === 0) { exit = sx[i].split(' ')[1] || sx[i]; break; } }
            }
            document.getElementById('stat-entry').innerText = entry;
            document.getElementById('stat-exit').innerText = exit;

            const sPct = (si / globalData.x.length) * 100;
            const ePct = (ei / globalData.x.length) * 100;
            const getPct = (v, min, max) => (min >= max) ? 50 : Math.max(0, Math.min(100, ((v - min) / (max - min)) * 100));
            let batch = [{ dataZoomIndex: 0, start: sPct, end: ePct }];
            if (axisState.lIdx) {
                const sp = globalData.yPrice.slice(si, ei + 1).filter(v => v !== null);
                if (sp.length > 0) { const pMin = Math.min(...sp)*0.998, pMax = Math.max(...sp)*1.002; batch.push({ dataZoomIndex: 1, start: getPct(pMin, pMin, pMax), end: getPct(pMax, pMin, pMax) }); }
            }
            if (axisState.lTot) {
                const st = globalData.yTotal.slice(si, ei + 1).filter(v => v !== null);
                if (st.length > 0) batch.push({ dataZoomIndex: 2, start: getPct(Math.min(...st)*0.95, 0, 5000), end: getPct(Math.max(...st)*1.05, 0, 5000) });
            }
            if (axisState.rPrf && spr.length > 0) batch.push({ dataZoomIndex: 3, start: getPct(Math.min(...spr)-0.1, -1, 5), end: getPct(Math.max(...spr)+0.1, -1, 5) });
            if (axisState.rTmv) {
                const subT = [...sw, ...sf];
                if (subT.length > 0) {
                    const allT = [...globalData.yTimeWed, ...globalData.yTimeFri].filter(v=>v!==null);
                    batch.push({ dataZoomIndex: 4, start: getPct(Math.min(...subT)-5, Math.min(...allT), Math.max(...allT)), end: getPct(Math.max(...subT)+5, Math.min(...allT), Math.max(...allT)) });
                }
            }
            myChart.dispatchAction({ type: 'dataZoom', batch });
        }

        function initChart(data) {
            const chartDom = document.getElementById('performance-chart');
            if (myChart) myChart.dispose();
            myChart = echarts.init(chartDom);
            const markAreas = [];
            rowRanges.forEach(range => {
                const start = range.start - 2;
                if (start >= 0 && start < data.x.length) {
                    markAreas.push([{ xAxis: data.x[start], itemStyle: { color: range.type === 'night' ? 'rgba(241, 245, 249, 0.4)' : 'transparent' }, label: { show: false } }, { xAxis: data.x[Math.min(range.end - 2, data.x.length - 1)] }]);
                }
            });
            const opt = {
                backgroundColor: 'transparent', textStyle: { fontFamily: 'Arial' },
                tooltip: {
                    trigger: 'axis', axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(255, 255, 255, 0.95)', borderColor: '#e2e8f0', textStyle: { color: '#1e293b', fontSize: 11, fontFamily: 'Arial' },
                    formatter: function(params) {
                        let res = `<div class="font-bold mb-1">${params[0].axisValue}</div>`;
                        let hasVal = false;
                        params.forEach(p => { if (p.value === null || p.value === undefined || (Array.isArray(p.data) && p.data.length === 0)) return; let val = p.value; if (p.seriesName === '獲利率') val = val.toFixed(2) + '%'; else val = Math.round(val).toLocaleString(); res += `<div class="flex justify-between gap-4 mt-0.5"><span>${p.marker} ${p.seriesName}</span><span class="font-bold">${val}</span></div>`; hasVal = true; });
                        return hasVal ? res : "";
                    }
                },
                xAxis: { type: 'category', data: data.x, boundaryGap: false, axisLabel: { color: '#94a3b8', fontSize: 10, rotate: 30, fontFamily: 'Arial' }, axisLine: { lineStyle: { color: '#f1f5f9' } } },
                yAxis: [ { type: 'value', name: '期指', position: 'left' }, { type: 'value', name: '總點', position: 'left' }, { type: 'value', name: '獲利%', position: 'right' }, { type: 'value', name: '時價', position: 'right' } ],
                dataZoom: [ { type: 'slider', xAxisIndex: 0 }, { type: 'slider', yAxisIndex: 0 }, { type: 'slider', yAxisIndex: 1 }, { type: 'slider', yAxisIndex: 2 }, { type: 'slider', yAxisIndex: 3 }, { type: 'inside', xAxisIndex: 0 } ],
                series: [
                    { type: 'line', data: [], markArea: { silent: true, data: markAreas }, silent: true },
                    { name: '獲利率', type: 'line', yAxisIndex: 2, data: data.yProfit, smooth: true, showSymbol: false, lineStyle: { width: 0 }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(225, 29, 72, 0.7)' }, { offset: 1, color: 'rgba(225, 29, 72, 0.05)' }]) }, z: 1 },
                    { name: '週三時價', type: 'line', yAxisIndex: 3, data: data.yTimeWed, smooth: true, showSymbol: false, lineStyle: { width: 2.2, color: '#ef4444', shadowBlur: 3 }, z: 4 },
                    { name: '週五時價', type: 'line', yAxisIndex: 3, data: data.yTimeFri, smooth: true, showSymbol: false, lineStyle: { width: 2.2, color: '#10b981', shadowBlur: 3 }, z: 4 },
                    { name: '期指', type: 'line', yAxisIndex: 0, data: data.yPrice, smooth: true, showSymbol: false, lineStyle: { width: 2.2, color: '#2563eb', shadowBlur: 3 }, z: 5 },
                    { name: '總點數', type: 'line', yAxisIndex: 1, data: data.yTotal, smooth: true, showSymbol: false, lineStyle: { width: 2.2, color: '#334155', shadowBlur: 3 }, z: 5 }
                ]
            };
            myChart.setOption(opt);
            updateChartUI();
        }
        window.onload = () => { 
            if (typeof lucide !== 'undefined') lucide.createIcons(); 
            fetchData(); 
            document.getElementById('refresh-btn').onclick = fetchData; 
            window.addEventListener('resize', () => { if(myChart) myChart.resize(); updateChartUI(); }); 
        };
    </script>
</body>
</html>
